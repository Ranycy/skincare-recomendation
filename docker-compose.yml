services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: B1823naa
      POSTGRES_DB: skinsense
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  skinsense-api:
    build: .
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql://postgres:B1823naa@db:5432/skinsense
      - WEATHERAPI_KEY=${WEATHERAPI_KEY}
      - ML_MODEL_PATH=/app/machine-learning
      - JWT_EXPIRATION_HOURS=24
      - GUEST_SESSION_HOURS=24
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - skinsense-api
    restart: unless-stopped

volumes:
  pgdata:
